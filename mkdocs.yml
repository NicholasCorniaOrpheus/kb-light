site_name: KB-light - Knowledge Base light powered by Obsidian Markdown vault
site_author: Nicholas Cornia
site_url: https://nicholascorniaorpheus.github.io/kb-light
repo_url: https://github.com/nicholascorniaorpheus/kb-light

# Create your custom pages in docs/ folder
nav: 
  - Home: index.md
  - Installation: installation.md
  - Tutorials: tutorials.md
  - API Documentation: api_documentation.md

plugins:
  - search
  - mkdocstrings

extra_css:
  - assets/css/extras.css


theme:
  name: material
  language: en
  icon:
    previous: fontawesome/solid/angle-left
    next: fontawesome/solid/angle-right
    admonition:
      abstract: fontawesome/solid/book
      note: fontawesome/solid/note-sticky
      quote: fontawesome/solid/quote-left

  font:
      text: Crimson Pro
  palette:
    - scheme: default
      primary: custom
      default: custom
      footer: custom
      accent: custom       

  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.sections
    - navigation.expand
    - navigation.prune
    - search.share
    - toc.integrate
    #- navigation.footer
    #- navigation.tabs
    #- navigation.tabs.sticky
    #- navigation.top
    #- toc.follow
    #- toc

copyright: Copyright &copy; 2026 Orpheus Instituut, Resounding Libraries

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/NicholasCorniaOrpheus/py-resounding-libraries
      name: GitHub repository
  social:
    - icon: material/music-note
      link: https://orpheusinstituut.be/
      name: Orpheus Instituut

markdown_extensions:
  - footnotes
  - tables
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  # icons extension!
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tabbed:
      alternate_style: true